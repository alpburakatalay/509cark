<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasemin Kalender'in Harika Sınıfı</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 10;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            border: 5px solid #ff6b6b;
            position: relative;
        }

        .side-panel {
            background-color: rgba(255, 255, 255, 0.8);
            width: 250px;
            height: 550px;
            border-radius: 20px;
            border: 2px solid #ff6b6b;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }

        .side-panel h2 {
            font-size: 1.5em;
            color: #d81b60;
            margin-top: 0;
            border-bottom: 2px solid #ff6b6b;
            padding-bottom: 10px;
        }

        #history-list {
            list-style: none;
            padding: 0;
            overflow-y: auto;
            text-align: left;
            flex-grow: 1;
        }

        #history-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            color: #555;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 {
            color: #d81b60;
            margin-bottom: 40px;
            font-size: 3em;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        #student-name {
            font-size: 4em;
            font-weight: bold;
            margin: 0;
            min-height: 1.2em;
            transition: transform 0.3s ease-in-out;
        }

        #student-name.animate { transform: scale(1.1); }

        #motivation-quote {
            font-style: italic;
            margin-top: 20px;
            font-size: 1.3em;
            color: #666;
            min-height: 1.5em;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #selectButton {
            padding: 20px 40px;
            font-size: 1.8em;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background-color: #ff4747;
            color: white;
            font-weight: bold;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            margin-top: 40px;
        }

        #selectButton:hover:not(:disabled) { background-color: #e03232; transform: scale(1.05); }
        #selectButton:disabled { background-color: #ccc; cursor: not-allowed; transform: scale(1); }

        #resetBtn {
            background: none;
            border: none;
            color: #999;
            text-decoration: underline;
            cursor: pointer;
            font-size: 1em;
        }

        .math-symbol {
            position: absolute;
            font-size: 5em;
            color: rgba(128, 0, 128, 0.5);
            pointer-events: none;
            z-index: 5;
            animation: float 15s ease-in-out infinite;
            opacity: 0.95;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .math-symbol:nth-child(1) { top: 5%; left: 5%; transform: rotate(15deg); animation-delay: 0s; }
        .math-symbol:nth-child(2) { top: 15%; right: 8%; transform: rotate(-25deg); animation-delay: 1s; }
        .math-symbol:nth-child(3) { bottom: 10%; left: 12%; transform: rotate(40deg); animation-delay: 2s; }
        .math-symbol:nth-child(4) { top: 30%; right: 20%; transform: rotate(-10deg); animation-delay: 3s; }
        .math-symbol:nth-child(5) { top: 45%; left: 18%; transform: rotate(50deg); animation-delay: 4s; }
        .math-symbol:nth-child(6) { bottom: 5%; right: 30%; transform: rotate(60deg); animation-delay: 5s; }
        .math-symbol:nth-child(7) { top: 25%; left: 45%; transform: rotate(-35deg); animation-delay: 6s; }
        .math-symbol:nth-child(8) { bottom: 25%; right: 40%; transform: rotate(75deg); animation-delay: 7s; }
        .math-symbol:nth-child(9) { top: 10%; left: 60%; transform: rotate(20deg); animation-delay: 8s; }
        .math-symbol:nth-child(10) { bottom: 15%; left: 50%; transform: rotate(-55deg); animation-delay: 9s; }
        .math-symbol:nth-child(11) { top: 55%; right: 5%; transform: rotate(30deg); animation-delay: 10s; }
        .math-symbol:nth-child(12) { top: 65%; left: 5%; transform: rotate(-45deg); animation-delay: 11s; }
        .math-symbol:nth-child(13) { bottom: 35%; left: 30%; transform: rotate(55deg); animation-delay: 12s; }
        .math-symbol:nth-child(14) { top: 30%; right: 50%; transform: rotate(-20deg); animation-delay: 13s; }
        .math-symbol:nth-child(15) { top: 70%; right: 25%; transform: rotate(45deg); animation-delay: 14s; }
        .math-symbol:nth-child(16) { bottom: 45%; right: 10%; transform: rotate(-15deg); animation-delay: 15s; }
        .math-symbol:nth-child(17) { top: 80%; left: 40%; transform: rotate(65deg); animation-delay: 16s; }
        .math-symbol:nth-child(18) { top: 50%; right: 45%; transform: rotate(-70deg); animation-delay: 17s; }
        .math-symbol:nth-child(19) { bottom: 50%; left: 60%; transform: rotate(80deg); animation-delay: 18s; }
        .math-symbol:nth-child(20) { top: 20%; left: 80%; transform: rotate(-50deg); animation-delay: 19s; }
        .math-symbol:nth-child(21) { top: 75%; left: 85%; transform: rotate(25deg); animation-delay: 0.5s; }
        .math-symbol:nth-child(22) { bottom: 20%; right: 60%; transform: rotate(-40deg); animation-delay: 2.5s; }
        .math-symbol:nth-child(23) { top: 10%; left: 35%; transform: rotate(70deg); animation-delay: 4.5s; }
        .math-symbol:nth-child(24) { bottom: 55%; left: 80%; transform: rotate(-10deg); animation-delay: 6.5s; }
        .math-symbol:nth-child(25) { top: 40%; left: 8%; transform: rotate(30deg); animation-delay: 8.5s; }
        .math-symbol:nth-child(26) { top: 2%; right: 2%; transform: rotate(50deg); animation-delay: 1.5s; }
        .math-symbol:nth-child(27) { top: 90%; left: 90%; transform: rotate(90deg); animation-delay: 3.5s; }
        .math-symbol:nth-child(28) { bottom: 85%; left: 20%; transform: rotate(-20deg); animation-delay: 5.5s; }
        .math-symbol:nth-child(29) { bottom: 70%; right: 5%; transform: rotate(35deg); animation-delay: 7.5s; }
        .math-symbol:nth-child(30) { top: 30%; left: 5%; transform: rotate(-40deg); animation-delay: 9.5s; }
        .math-symbol:nth-child(31) { top: 80%; right: 30%; transform: rotate(60deg); animation-delay: 11.5s; }
        .math-symbol:nth-child(32) { bottom: 10%; right: 80%; transform: rotate(-25deg); animation-delay: 13.5s; }
        .math-symbol:nth-child(33) { top: 60%; left: 70%; transform: rotate(45deg); animation-delay: 15.5s; }
        .math-symbol:nth-child(34) { top: 5%; left: 80%; transform: rotate(-55deg); animation-delay: 17.5s; }
        .math-symbol:nth-child(35) { bottom: 5%; left: 45%; transform: rotate(70deg); animation-delay: 19.5s; }
        .math-symbol:nth-child(36) { top: 40%; right: 70%; transform: rotate(10deg); animation-delay: 2.5s; }
        .math-symbol:nth-child(37) { bottom: 30%; left: 90%; transform: rotate(80deg); animation-delay: 4.5s; }
        .math-symbol:nth-child(38) { top: 20%; left: 25%; transform: rotate(-40deg); animation-delay: 6.5s; }
        .math-symbol:nth-child(39) { bottom: 65%; right: 45%; transform: rotate(30deg); animation-delay: 8.5s; }
        .math-symbol:nth-child(40) { top: 95%; left: 50%; transform: rotate(-15deg); animation-delay: 10.5s; }

        @keyframes float {
            0% { transform: translateY(0px) scale(1) rotate(var(--rotation)); opacity: 0.95; }
            50% { transform: translateY(-15px) scale(1.08) rotate(calc(var(--rotation) + 5deg)); opacity: 1; }
            100% { transform: translateY(0px) scale(1) rotate(var(--rotation)); opacity: 0.95; }
        }
    </style>
</head>
<body>

    <div class="math-symbol" style="--rotation: 15deg;">&sum;</div>
    <div class="math-symbol" style="--rotation: -25deg;">&int;</div>
    <div class="math-symbol" style="--rotation: 40deg;">&infin;</div>
    <div class="math-symbol" style="--rotation: -10deg;">&pi;</div>
    <div class="math-symbol" style="--rotation: 50deg;">&radic;</div>
    <div class="math-symbol" style="--rotation: 60deg;">&forall;</div>
    <div class="math-symbol" style="--rotation: -35deg;">&exist;</div>
    <div class="math-symbol" style="--rotation: 75deg;">&sigma;</div>
    <div class="math-symbol" style="--rotation: 20deg;">&prod;</div>
    <div class="math-symbol" style="--rotation: -55deg;">&cap;</div>
    <div class="math-symbol" style="--rotation: 30deg;">&cup;</div>
    <div class="math-symbol" style="--rotation: -45deg;">&equiv;</div>
    <div class="math-symbol" style="--rotation: 55deg;">&ne;</div>
    <div class="math-symbol" style="--rotation: -20deg;">&ge;</div>
    <div class="math-symbol" style="--rotation: 45deg;">&le;</div>
    <div class="math-symbol" style="--rotation: -15deg;">&oplus;</div>
    <div class="math-symbol" style="--rotation: 65deg;">&otimes;</div>
    <div class="math-symbol" style="--rotation: -70deg;">&approx;</div>
    <div class="math-symbol" style="--rotation: 80deg;">&nabla;</div>
    <div class="math-symbol" style="--rotation: -50deg;">&part;</div>
    <div class="math-symbol" style="--rotation: 25deg;">1</div>
    <div class="math-symbol" style="--rotation: -40deg;">2</div>
    <div class="math-symbol" style="--rotation: 70deg;">&alpha;</div>
    <div class="math-symbol" style="--rotation: -10deg;">&beta;</div>
    <div class="math-symbol" style="--rotation: 30deg;">x</div>
    <div class="math-symbol" style="--rotation: 0deg;">y</div>
    <div class="math-symbol" style="--rotation: 90deg;">z</div>
    <div class="math-symbol" style="--rotation: -30deg;">=</div>
    <div class="math-symbol" style="--rotation: 45deg;">+</div>
    <div class="math-symbol" style="--rotation: -60deg;">-</div>
    <div class="math-symbol" style="--rotation: 10deg;">*</div>
    <div class="math-symbol" style="--rotation: 75deg;">/</div>
    <div class="math-symbol" style="--rotation: 25deg;">3</div>
    <div class="math-symbol" style="--rotation: -40deg;">4</div>
    <div class="math-symbol" style="--rotation: 70deg;">5</div>
    <div class="math-symbol" style="--rotation: -10deg;">6</div>
    <div class="math-symbol" style="--rotation: 30deg;">7</div>
    <div class="math-symbol" style="--rotation: 0deg;">8</div>
    <div class="math-symbol" style="--rotation: 90deg;">9</div>
    <div class="math-symbol" style="--rotation: -30deg;">0</div>
    <div class="math-symbol" style="--rotation: 45deg;">(</div>
    <div class="math-symbol" style="--rotation: -60deg;">)</div>
    <div class="math-symbol" style="--rotation: 10deg;">[</div>
    <div class="math-symbol" style="--rotation: 75deg;">]</div>

    <div class="wrapper">
        <div class="container">
            <h1>Yasemin Kalender'in Harika Sınıfı</h1>
            <div id="result-container">
                <p id="student-name" style="color:#555">Döndürmek için tıkla!</p>
                <p id="motivation-quote"></p>
            </div>
            <div class="btn-group">
                <button id="selectButton">Çarkı Döndür</button>
                <button id="resetBtn">Sıfırla</button>
            </div>
        </div>

        <div class="side-panel">
            <h2>Seçilenler</h2>
            <ul id="history-list"></ul>
        </div>
    </div>

    <audio id="mainSound" src="audio1.mp3" preload="auto"></audio>

    <script>
        const SIFRE = "1234";
        const SES_SURESI = 5860; 

        const ogrenciler = [
            { ad: "Alp Burak Atalay", olasilik: 1 }, { ad: "Arda Türkgenç", olasilik: 1 },
            { ad: "Atlas Erk Atilla", olasilik: 1 }, { ad: "Baybars Ayhan", olasilik: 1 },
            { ad: "Bulut Ege Gümüştekin", olasilik: 1 }, { ad: "Cihangir Koca", olasilik: 1 },
            { ad: "Ece Kartal", olasilik: 1 }, { ad: "Elisa Öztürk", olasilik: 1 },
            { ad: "Emir Alp Keskin", olasilik: 1 }, { ad: "Eylül Dinçer", olasilik: 1 },
            { ad: "Hera Deniz Koca", olasilik: 1 }, { ad: "İbrahim Eray Öcal", olasilik: 1 },
            { ad: "Sevil Ela Zeybek", olasilik: 1 }, { ad: "Tibet Özenç", olasilik: 1 },
            { ad: "Tuna Uğurlu", olasilik: 1 }, { ad: "Vera Atay", olasilik: 1 },
            { ad: "Yaren Gözübüyük", olasilik: 1 }, { ad: "Yiğithan Yiğit", olasilik: 1 },
            { ad: "Yunus Emre Çiğdem", olasilik: 1 }, { ad: "Yusuf Ziya Aytaç", olasilik: 1 },
            { ad: "Zeynep Asya Çakır", olasilik: 1 }, { ad: "Zeynep Bölükbaşı", olasilik: 1 },
            { ad: "Emin Çetin", olasilik: 1 }
        ];

        const motivasyonSozleri = ["Başarı, doğru zamanda doğru kararlar almaktan geçer.",
            "En büyük zafer, asla pes etmemektir.",
            "Bugün atılan küçük bir adım, yarın büyük bir zafere dönüşebilir.",
            "İnanırsan, her şey mümkündür.",
            "Zorluklar, başarıya giden yolda birer basamaktır.",
            "Her gün daha iyiye ulaşmak için bir şanstır.",
            "Cesaret, korkudan bir adım önde olmaktır.",
            "Sınırlı zihninizin ötesine geçin ve potansiyelinizi keşfedin."];
        const renkler = ['#FF6B6B', '#FFD166', '#06D6A0', '#118AB2', '#F72585'];
        
        let secilenIsimler = JSON.parse(localStorage.getItem('secilenOgrenciler')) || [];
        let kalanOgrenciler = ogrenciler.filter(o => !secilenIsimler.includes(o.ad));
        
        let intervalId = null;

        const selectButton = document.getElementById('selectButton');
        const studentNameDiv = document.getElementById('student-name');
        const quoteDiv = document.getElementById('motivation-quote');
        const historyList = document.getElementById('history-list');
        const mainSound = document.getElementById('mainSound');

        // Başlangıçta localStorage'dan geçmişi yükle
        function gecmisiYukle() {
            historyList.innerHTML = "";
            secilenIsimler.forEach(isim => {
                const li = document.createElement('li');
                li.textContent = isim;
                historyList.appendChild(li);
            });
            historyList.scrollTop = historyList.scrollHeight;
        }
        gecmisiYukle();

        function agirlikliSec(liste) {
            let toplam = liste.reduce((s, o) => s + o.olasilik, 0);
            let r = Math.random() * toplam;
            for (let i = 0; i < liste.length; i++) {
                if (r < liste[i].olasilik) return i;
                r -= liste[i].olasilik;
            }
        }

        selectButton.addEventListener('click', () => {
            if (kalanOgrenciler.length === 0) {
                alert("Herkes seçildi!Sıfırlamak için şifreyi kullanın.");
                return;
            }

            selectButton.disabled = true;
            quoteDiv.textContent = "Şanslı kişi belirleniyor...";
            
            mainSound.currentTime = 0;
            mainSound.play().catch(() => {});

            intervalId = setInterval(() => {
                const rand = ogrenciler[Math.floor(Math.random() * ogrenciler.length)];
                studentNameDiv.textContent = rand.ad;
                studentNameDiv.style.color = renkler[Math.floor(Math.random() * renkler.length)];
            }, 60);

            setTimeout(() => {
                clearInterval(intervalId);

                const index = agirlikliSec(kalanOgrenciler);
                const secilen = kalanOgrenciler.splice(index, 1)[0];

                // LocalStorage kaydı
                secilenIsimler.push(secilen.ad);
                localStorage.setItem('secilenOgrenciler', JSON.stringify(secilenIsimler));

                studentNameDiv.textContent = secilen.ad;
                studentNameDiv.style.color = "#d81b60";
                quoteDiv.textContent = motivasyonSozleri[Math.floor(Math.random() * motivasyonSozleri.length)];

                // Yan listeye ekle
                const li = document.createElement('li');
                li.textContent = secilen.ad;
                historyList.appendChild(li);
                historyList.scrollTop = historyList.scrollHeight;

                selectButton.disabled = false;
                
                studentNameDiv.classList.remove('animate');
                void studentNameDiv.offsetWidth; 
                studentNameDiv.classList.add('animate');
            }, SES_SURESI);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (prompt("Sıfırlama şifresi:") === SIFRE) {
                localStorage.removeItem('secilenOgrenciler');
                secilenIsimler = [];
                kalanOgrenciler = [...ogrenciler];
                historyList.innerHTML = "";
                studentNameDiv.textContent = "Döndürmek için tıkla!";
                studentNameDiv.style.color = "#555";
                quoteDiv.textContent = "";
                mainSound.pause();
                selectButton.disabled = false;
                alert("Tüm kayıtlar silindi ve liste sıfırlandı!");
            } else {
                alert("Hatalı şifre!");
            }
        });
    </script>
</body>
</html>
