<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasemin Kalender'in Harika Sınıfı</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 10;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            border: 5px solid #ff6b6b;
            position: relative;
        }

        .side-panel {
            background-color: rgba(255, 255, 255, 0.8);
            width: 250px;
            height: 550px;
            border-radius: 20px;
            border: 2px solid #ff6b6b;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }

        .side-panel h2 {
            font-size: 1.5em;
            color: #d81b60;
            margin-top: 0;
            border-bottom: 2px solid #ff6b6b;
            padding-bottom: 10px;
        }

        #history-list {
            list-style: none;
            padding: 0;
            overflow-y: auto;
            text-align: left;
            flex-grow: 1;
        }

        #history-list li {
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            color: #555;
        }

        h1 {
            color: #d81b60;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #student-name {
            font-size: 3.5em;
            font-weight: bold;
            margin: 0;
            min-height: 1.2em;
            transition: transform 0.3s ease-in-out;
        }

        .animate { transform: scale(1.1); }

        .group-controls {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ff6b6b;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .group-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #groupSize {
            padding: 10px;
            font-size: 1em;
            border-radius: 10px;
            border: 2px solid #ccc;
        }

        #createGroupsBtn {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #118AB2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        #createGroupsBtn:hover { background-color: #0b6c8d; }

        #resetBtn {
            background: none;
            border: none;
            color: #999;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85em;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .groups-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .group-card {
            background: #f9f9f9;
            border: 3px solid #06D6A0;
            border-radius: 15px;
            padding: 15px;
            text-align: left;
        }

        .group-card h3 { color: #d81b60; margin: 0 0 10px 0; font-size: 1.2em; text-align: center; border-bottom: 2px solid #eee; }
        .group-card ul { list-style: none; padding: 0; margin: 0; }
        .group-card li { padding: 5px 0; border-bottom: 1px dashed #ddd; font-size: 1em; }

        .math-symbol {
            position: absolute;
            font-size: 4em;
            color: rgba(128, 0, 128, 0.3);
            pointer-events: none;
            z-index: 5;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
</head>
<body>

    <div class="math-symbol" style="--rotation: 15deg;">&sum;</div>
    <div class="math-symbol" style="--rotation: -25deg;">&int;</div>
    <div class="math-symbol" style="--rotation: 40deg;">&infin;</div>
    <div class="math-symbol" style="--rotation: -10deg;">&pi;</div>
    <div class="math-symbol" style="--rotation: 50deg;">&radic;</div>
    <div class="math-symbol" style="--rotation: 60deg;">&forall;</div>
    <div class="math-symbol" style="--rotation: -35deg;">&exist;</div>
    <div class="math-symbol" style="--rotation: 75deg;">&sigma;</div>
    <div class="math-symbol" style="--rotation: 20deg;">&prod;</div>
    <div class="math-symbol" style="--rotation: -55deg;">&cap;</div>
    <div class="math-symbol" style="--rotation: 30deg;">&cup;</div>
    <div class="math-symbol" style="--rotation: -45deg;">&equiv;</div>
    <div class="math-symbol" style="--rotation: 55deg;">&ne;</div>
    <div class="math-symbol" style="--rotation: -20deg;">&ge;</div>
    <div class="math-symbol" style="--rotation: 45deg;">&le;</div>
    <div class="math-symbol" style="--rotation: -15deg;">&oplus;</div>
    <div class="math-symbol" style="--rotation: 65deg;">&otimes;</div>
    <div class="math-symbol" style="--rotation: -70deg;">&approx;</div>
    <div class="math-symbol" style="--rotation: 80deg;">&nabla;</div>
    <div class="math-symbol" style="--rotation: -50deg;">&part;</div>
    <div class="math-symbol" style="--rotation: 25deg;">1</div>
    <div class="math-symbol" style="--rotation: -40deg;">2</div>
    <div class="math-symbol" style="--rotation: 70deg;">&alpha;</div>
    <div class="math-symbol" style="--rotation: -10deg;">&beta;</div>
    <div class="math-symbol" style="--rotation: 30deg;">x</div>
    <div class="math-symbol" style="--rotation: 0deg;">y</div>
    <div class="math-symbol" style="--rotation: 90deg;">z</div>
    <div class="math-symbol" style="--rotation: -30deg;">=</div>
    <div class="math-symbol" style="--rotation: 45deg;">+</div>
    <div class="math-symbol" style="--rotation: -60deg;">-</div>
    <div class="math-symbol" style="--rotation: 10deg;">*</div>
    <div class="math-symbol" style="--rotation: 75deg;">/</div>
    <div class="math-symbol" style="--rotation: 25deg;">3</div>
    <div class="math-symbol" style="--rotation: -40deg;">4</div>
    <div class="math-symbol" style="--rotation: 70deg;">5</div>
    <div class="math-symbol" style="--rotation: -10deg;">6</div>
    <div class="math-symbol" style="--rotation: 30deg;">7</div>
    <div class="math-symbol" style="--rotation: 0deg;">8</div>
    <div class="math-symbol" style="--rotation: 90deg;">9</div>
    <div class="math-symbol" style="--rotation: -30deg;">0</div>
    <div class="math-symbol" style="--rotation: 45deg;">(</div>
    <div class="math-symbol" style="--rotation: -60deg;">)</div>
    <div class="math-symbol" style="--rotation: 10deg;">[</div>
    <div class="math-symbol" style="--rotation: 75deg;">]</div>

    <div class="wrapper">
        <div class="container">
            <h1>Yasemin Kalender'in Harika Sınıfı</h1>
            <div id="result-container">
                <p id="student-name" style="color:#555">Döndürmek İçin Tıkla!</p>
                <p id="motivation-quote" style="font-style:italic; color:#777; height:20px;"></p>
            </div>
            
            <div class="btn-group" style="margin-top:30px;">
                <button id="selectButton" style="padding: 15px 40px; font-size: 1.5em; border-radius: 50px; background: #ff4747; color: white; border: none; cursor: pointer; font-weight: bold;">Çarkı Döndür</button>
            </div>

            <div class="group-controls">
                <div class="group-row">
                    <label>Grup Kapasitesi:</label>
                    <select id="groupSize">
                        <option value="2">2 Kişilik</option><option value="3">3 Kişilik</option>
                        <option value="4">4 Kişilik</option><option value="5">5 Kişilik</option>
                        <option value="6">6 Kişilik</option><option value="7">7 Kişilik</option>
                        <option value="8">8 Kişilik</option><option value="9">9 Kişilik</option>
                        <option value="10">10 Kişilik</option><option value="11">11 Kişilik</option>
                    </select>
                    <button id="createGroupsBtn">KARIŞTIR VE GRUPLA</button>
                </div>
                <button id="resetBtn">Verileri Sıfırla</button>
            </div>
        </div>

        <div class="side-panel">
            <h2>Seçilenler</h2>
            <ul id="history-list"></ul>
        </div>
    </div>

    <div id="groupModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: #118AB2;">Karıştırılmış Gruplar</h2>
            <p id="info-note" style="color: #666; font-size: 0.9em;"></p>
            <div id="groupsContainer" class="groups-wrapper"></div>
            <button onclick="document.getElementById('groupModal').style.display='none'" style="margin-top:20px; padding:10px 30px; cursor:pointer; background:#ff4747; color:white; border:none; border-radius:10px;">KAPAT</button>
        </div>
    </div>

    <audio id="mainSound" src="audio1.mp3" preload="auto"></audio>

    <script>
        const SIFRE = "1234";
        const SES_SURESI = 5860;
        const ogrenciler = [
            "Alp Burak Atalay", "Arda Türkgenç", "Atlas Erk Atilla", "Baybars Ayhan",
            "Bulut Ege Gümüştekin", "Cihangir Koca", "Ece Kartal", "Elisa Öztürk",
            "Emir Alp Keskin", "Eylül Dinçer", "Hera Deniz Koca", "İbrahim Eray Öcal",
            "Sevil Ela Zeybek", "Tibet Özenç", "Tuna Uğurlu", "Vera Atay",
            "Yaren Gözübüyük", "Yiğithan Yiğit", "Yunus Emre Çiğdem", "Yusuf Ziya Aytaç",
            "Zeynep Asya Çakır", "Zeynep Bölükbaşı", "Emin Çetin"
        ];

        let secilenler = JSON.parse(localStorage.getItem('secilenOgrenciler')) || [];
        let kalanlar = ogrenciler.filter(o => !secilenler.includes(o));

        function guncelle() {
            document.getElementById('history-list').innerHTML = secilenler.map(n => `<li>${n}</li>`).join('');
            document.getElementById('history-list').scrollTop = 9999;
        }
        guncelle();

        // Çark
        document.getElementById('selectButton').addEventListener('click', () => {
            if (kalanlar.length === 0) return alert("Herkes seçildi!");
            const btn = document.getElementById('selectButton');
            const nameDiv = document.getElementById('student-name');
            btn.disabled = true;
            document.getElementById('mainSound').play();

            let spin = setInterval(() => {
                nameDiv.textContent = ogrenciler[Math.floor(Math.random() * ogrenciler.length)];
                nameDiv.style.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }, 60);

            setTimeout(() => {
                clearInterval(spin);
                const idx = Math.floor(Math.random() * kalanlar.length);
                const win = kalanlar.splice(idx, 1)[0];
                secilenler.push(win);
                localStorage.setItem('secilenOgrenciler', JSON.stringify(secilenler));
                nameDiv.textContent = win;
                nameDiv.style.color = "#d81b60";
                guncelle();
                btn.disabled = false;
            }, SES_SURESI);
        });

        // Grup Yapma (Tek kalanı atama özelliği eklendi)
        document.getElementById('createGroupsBtn').addEventListener('click', () => {
            const size = parseInt(document.getElementById('groupSize').value);
            let pool = [...ogrenciler];
            
            // 1. Aşama: Kaotik Karıştırma
            for (let i = 0; i < 5; i++) {
                pool.sort(() => Math.random() - 0.5);
                for (let j = pool.length - 1; j > 0; j--) {
                    const k = Math.floor(Math.random() * (j + 1));
                    [pool[j], pool[k]] = [pool[k], pool[j]];
                }
            }

            // 2. Aşama: Gruplara Böl
            let resultGroups = [];
            for (let i = 0; i < pool.length; i += size) {
                resultGroups.push(pool.slice(i, i + size));
            }

            // 3. Aşama: Tek Kalan Kontrolü
            // Eğer son grup sadece 1 kişiyse ve istenen grup büyüklüğü 1'den fazlaysa
            if (resultGroups.length > 1 && resultGroups[resultGroups.length - 1].length === 1) {
                const aloneStudent = resultGroups.pop()[0]; // Son kişiyi gruptan çıkar
                const randomGroupIdx = Math.floor(Math.random() * resultGroups.length);
                resultGroups[randomGroupIdx].push(aloneStudent); // Rastgele bir gruba ekle
                document.getElementById('info-note').textContent = `* ${aloneStudent} tek kaldığı için rastgele bir gruba dahil edildi.`;
            } else {
                document.getElementById('info-note').textContent = "";
            }

            // Çizim
            const container = document.getElementById('groupsContainer');
            container.innerHTML = "";
            resultGroups.forEach((g, i) => {
                const card = document.createElement('div');
                card.className = 'group-card';
                card.innerHTML = `<h3>Takım ${i+1}</h3><ul>${g.map(name => `<li>${name}</li>`).join('')}</ul>`;
                container.appendChild(card);
            });

            document.getElementById('groupModal').style.display = 'flex';
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (prompt("Şifre:") === SIFRE) {
                localStorage.clear();
                location.reload();
            }
        });
    </script>
</body>
</html>
